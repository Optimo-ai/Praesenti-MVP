<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Praesenti</title>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin
    src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>


  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
    rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --t950: #061f1d;
      --t900: #0d3d3a;
      --t800: #0f4d49;
      --t700: #136158;
      --t600: #1a7a72;
      --t500: #1a9e95;
      --t400: #20bdb3;
      --t300: #4dd0c8;
      --t200: #a0e8e4;
      --t100: #d6f5f3;
      --t50: #f0fdfb;
      --g900: #0f1117;
      --g700: #374151;
      --g600: #4b5563;
      --g500: #6b7280;
      --g400: #9ca3af;
      --g300: #d1d5db;
      --g200: #e5e7eb;
      --g100: #f3f4f6;
      --g50: #f9fafb;
    }

    html,
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      color: var(--g900);
      background: #fff;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    input[type=range] {
      width: 100%;
      height: 2px;
      border-radius: 2px;
      outline: none;
      background: linear-gradient(90deg, var(--t500) var(--p, 16%), var(--g200) var(--p, 16%));
      cursor: pointer;
      border: none;
      -webkit-appearance: none;
      appearance: none;
      margin-bottom: 6px;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--t500);
      box-shadow: 0 1px 6px rgba(0, 0, 0, .15);
      cursor: pointer;
    }

    /* Prevent flex children from overflowing on mobile */
    .dash-screen {
      min-width: 0;
      overflow-x: hidden;
      box-sizing: border-box;
    }

    @media (max-width: 768px) {
      .dash-screen {
        padding: 20px 16px !important;
      }
    }

    @media (max-width: 480px) {
      .dash-screen {
        padding: 16px 12px !important;
      }
    }

    /* ── RESPONSIVE OVERRIDES ── */

    /* Mobile hamburger / sidebar overlay */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 199;
    }

    .sidebar-overlay.open {
      display: block;
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      align-items: center;
      justify-content: center;
    }

    /* Tables: allow horizontal scroll on small screens */
    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    @media (max-width: 1024px) {

      /* Admin / Patient sidebar: off-canvas drawer below sticky header */
      .app-sidebar {
        position: fixed !important;
        left: -240px !important;
        top: 60px !important;
        bottom: 0 !important;
        width: 220px !important;
        z-index: 200;
        transition: left .25s ease;
        overflow-y: auto;
      }

      .app-sidebar.open {
        left: 0 !important;
      }

      .sidebar-overlay {
        top: 60px !important;
      }

      .mobile-menu-btn {
        display: flex !important;
      }

      /* Main content: fill remaining width, allow shrink */
      .dash-layout-inner {
        flex: 1 !important;
        min-width: 0 !important;
        overflow-x: hidden !important;
      }

      /* Admin overview: 4-col → 2-col */
      .grid-4 {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      /* 3-col → 2-col */
      .grid-3 {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      /* Pipeline: 6-col → 3-col */
      .grid-6 {
        grid-template-columns: repeat(3, 1fr) !important;
      }

      /* Admin case detail: side panel stacks below */
      .case-detail-layout {
        flex-direction: column !important;
      }

      .case-notes-panel {
        width: 100% !important;
        border-left: none !important;
        border-top: 1px solid #e5e7eb !important;
      }
    }

    @media (max-width: 768px) {

      /* Nav padding */
      .landing-nav {
        padding: 0 16px !important;
      }

      .landing-nav .nav-links {
        display: none !important;
      }

      /* Keep lang switcher + buttons visible, compress gap */
      .nav-right {
        gap: 8px !important;
        flex-wrap: nowrap !important;
      }

      /* Hero: single column */
      .hero-section {
        grid-template-columns: 1fr !important;
        padding: 100px 24px 60px !important;
        gap: 40px !important;
      }

      .hero-card {
        display: none !important;
      }

      /* How it works: 4-col → 2-col */
      .grid-4 {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      /* Procedures: 3-col → 2-col */
      .grid-3 {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      /* Why DR: 3-col → 2-col */
      .grid-why {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      /* Section padding */
      .section-pad {
        padding: 64px 24px !important;
      }

      .footer-layout {
        flex-direction: column !important;
        gap: 12px !important;
        text-align: center !important;
        padding: 28px 24px !important;
      }

      /* Dashboard header padding */
      .dash-header {
        padding: 0 16px !important;
      }

      .dash-main {
        padding: 20px 16px !important;
      }

      /* Stat grids */
      .grid-4 {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      .grid-3 {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      /* Pipeline */
      .grid-6 {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      /* Modals: full width on mobile */
      .modal-inner {
        max-width: 100% !important;
        margin: 0 !important;
        border-radius: 16px 16px 0 0 !important;
      }

      .modal-backdrop {
        align-items: flex-end !important;
        padding: 0 !important;
      }
    }

    @media (max-width: 480px) {

      /* Hero */
      .hero-section {
        padding: 90px 16px 48px !important;
      }

      /* Nav: hide sign-in button, keep lang + begin */
      .nav-signin {
        display: none !important;
      }

      .landing-nav {
        padding: 0 12px !important;
      }

      /* Grids collapse to 1 col */
      .grid-4,
      .grid-3,
      .grid-2 {
        grid-template-columns: 1fr !important;
      }

      .grid-6 {
        grid-template-columns: 1fr 1fr !important;
      }

      .grid-why {
        grid-template-columns: 1fr 1fr !important;
      }

      /* Wizard step 1 grid */
      .wz-grid {
        grid-template-columns: 1fr !important;
      }

      /* Section padding */
      .section-pad {
        padding: 48px 16px !important;
      }

      /* Table: show only key columns via display */
      .col-hide-xs {
        display: none !important;
      }

      /* Buttons row wrap */
      .hero-btns {
        flex-wrap: wrap !important;
      }

      /* Case detail tabs: scrollable */
      .case-tabs {
        overflow-x: auto;
        white-space: nowrap;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- Vite injects env vars at build time (works in dev + production/Vercel) -->
  <script>
    window.VITE_SUPABASE_URL = "%VITE_SUPABASE_URL%";
    window.VITE_SUPABASE_KEY = "%VITE_SUPABASE_KEY%";
    // Legacy aliases used by some components
    window.SUPA_URL = window.VITE_SUPABASE_URL;
    window.SUPA_KEY = window.VITE_SUPABASE_KEY;
  </script>
  <script type="module" src="./src/App.js"></script>
</body>

</html>
